
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>노부장의 심기 경호</title>
  <style>
    :root {
      --primary:  #1e293b;
      --danger:   #dc2626;
      --success:  #16a34a;
      --hint-bg:  #fef3c7;
      --hint-fg:  #d97706;
      --text:     #0f172a;
      --muted:    #64748b;
      --bg:       #f1f5f9;
      --border:   #e2e8f0;
      --radius:   12px;
    }
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; padding: 0; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; overflow: hidden; }
    body { display: flex; justify-content: center; align-items: center; }
    .app { position: relative; width: 100%; max-width: 430px; height: 100%; background: #fff; display: flex; flex-direction: column; box-shadow: 0 0 24px rgba(0,0,0,0.4); }
    .screen { display: none; flex-direction: column; flex: 1; width: 100%; height: 100%; overflow: hidden; }
    .screen.active { display: flex; }
    .btn { width: 100%; padding: 1rem; border: none; border-radius: var(--radius); font-family: inherit; font-size: 1rem; font-weight: 700; color: #fff; background: var(--primary); cursor: pointer; transition: filter 0.15s, transform 0.1s; }
    .btn:active { filter: brightness(0.85); transform: scale(0.97); }
    .btn-danger { background: var(--danger); }
    .btn-success { background: var(--success); }
    .result-screen { justify-content: center; align-items: center; text-align: center; padding: 2rem 1.5rem; gap: 0; }
    .result-screen .emoji { font-size: 4rem; margin-bottom: 0.75rem; }
    .result-screen h1 { font-size: 1.6rem; font-weight: 900; color: var(--text); margin: 0 0 0.75rem; }
    .result-screen .desc { font-size: 0.95rem; line-height: 1.65; color: #475569; margin: 0 0 2rem; }
    #game-screen { padding: 0.75rem 0.75rem 0.6rem; justify-content: space-between; }
    .app-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 0.4rem; }
    .badge { padding: 0.4rem 0.7rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    .badge-hint { background: var(--hint-bg); color: var(--hint-fg); border-color: #fde68a; cursor: pointer; }
    .badge-hint.disabled { background: #e2e8f0 !important; color: #94a3b8 !important; cursor: not-allowed; }
    .timer-text { margin-left: auto; color: var(--danger); font-size: 1rem; font-weight: 800; }
    .timer-track { width: 100%; height: 8px; border-radius: 4px; background: #e2e8f0; overflow: hidden; margin-bottom: 0.6rem; }
    #timer-bar { height: 100%; width: 100%; border-radius: 4px; transition: width 0.1s linear, background 0.3s; }
    .bujang-box { display: flex; flex-direction: column; align-items: center; margin-bottom: 0.5rem; }
    .bujang-emoji { font-size: 3rem; line-height: 1; margin-bottom: 0.2rem; }
    .bujang-status { display: inline-block; font-size: 0.8rem; font-weight: 700; padding: 0.2rem 0.7rem; border-radius: 20px; }
    .log-box { flex: 1; background: var(--bg); border: 1px solid #cbd5e1; border-radius: var(--radius); padding: 0.8rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 0.6rem; }
    .log-item { display: flex; flex-direction: column; }
    .sender-name { font-size: 0.72rem; color: var(--muted); font-weight: 700; margin-bottom: 0.2rem; }
    .bubble { display: inline-block; max-width: 85%; padding: 0.55rem 0.8rem; border-radius: 10px; font-size: 0.9rem; line-height: 1.5; }
    .log-bujang .bubble { background: #fff; border: 1px solid var(--border); }
    .log-user .bubble { background: #2563eb; color: #fff; align-self: flex-end; }
    .log-hint .bubble { background: #fffbeb; border: 1px dashed #f59e0b; color: #b45309; text-align: center; align-self: center; }
    .input-area { display: flex; gap: 8px; }
    .input-area input { flex: 1; height: 46px; padding: 0 1rem; border: 2px solid #cbd5e1; border-radius: var(--radius); outline: none; }
    .send-btn { height: 46px; padding: 0 1.2rem; border: none; border-radius: var(--radius); background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; }

#start-screen::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(rgba(0,0,0,.05),rgba(0,0,0,.45));
}
.start-title-ui{position:relative;z-index:2;width:100%;padding:24px;}
.start-title-ui .btn{background:#f5b21a;color:#111827;}
</style>
</head>
<body>
<div class="app">
  <div id="start-screen" class="screen active">
  <div class="start-title-ui">
    <button class="btn" onclick="startGame()">🚨 게임 시작</button>
  </div>
</div>

  <div id="game-screen" class="screen">
    <div class="app-bar">
      <div class="badge">기회: <span id="chance-count">20</span></div>
      <button id="hint-btn" class="badge badge-hint" onclick="useHint()">💡 힌트 (<span id="hint-count">2</span>)</button>
      <div id="timer-text" class="timer-text">30.0초</div>
    </div>
    <div class="timer-track"><div id="timer-bar"></div></div>
    <div class="bujang-box">
      <div class="bujang-emoji" id="bujang-emoji">👹</div>
      <div class="bujang-status" id="bujang-status">혈압 지수: 99%</div>
    </div>
    <div class="log-box" id="log-box"></div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="질문을 입력하세요...">
      <button class="send-btn" onclick="submitGuess()">제출</button>
    </div>
  </div>

  <div id="fail-screen" class="screen result-screen">
    <div class="emoji">✍️📄</div>
    <h1>[권고사직]</h1>
    <p class="desc" id="fail-reason"></p>
    <button class="btn btn-danger" onclick="resetGame()">다시 도전</button>
  </div>
</div>

<script>
  const WORD_POOL = [{word: "아메리카노", type: "음료", isEatable: true, specificHint: "내 혈관에 수혈해야 하는 차갑고 까만 액체라네."}, {word: "법인카드", type: "물건", isObject: true, specificHint: "회식할 때 긁는 마법의 플라스틱 카드지!"}];
  let target, chances, hints, timeLeft, timerId;
  const $ = id => document.getElementById(id);

  function setBujang(emoji, status, bg, color) {
    $('bujang-emoji').textContent = emoji;
    const s = $('bujang-status');
    s.textContent = status;
    s.style.background = bg;
    s.style.color = color;
  }

  function renderTimer() {
    timeLeft = Math.max(0, timeLeft - 0.1);
    $('timer-text').textContent = timeLeft.toFixed(1) + '초';
    const pct = (timeLeft / 30) * 100;
    const bar = $('timer-bar');
    bar.style.width = pct + '%';
    
    if (pct > 70) { bar.style.background = '#16a34a'; setBujang('👹', '혈압 지수: 99%', '#fee2e2', '#dc2626'); }
    else if (pct > 40) { bar.style.background = '#f59e0b'; setBujang('🤨', '혈압 지수: 110% (슬슬 한계)', '#fef3c7', '#d97706'); }
    else if (pct > 15) { bar.style.background = '#dc2626'; setBujang('😡', '혈압 지수: 130% (폭발 직전!)', '#fee2e2', '#dc2626'); }
    else { bar.style.background = '#7f1d1d'; setBujang('🌋', '혈압 지수: 200% (당장 퇴사각)', '#fca5a5', '#991b1b'); }

    if (timeLeft <= 0) { clearInterval(timerId); $('fail-reason').innerHTML = "시간 초과! 부장님 혈압 폭발!"; $('fail-screen').classList.add('active'); $('game-screen').classList.remove('active'); }
  }

  function startGame() {
    target = WORD_POOL[Math.floor(Math.random() * WORD_POOL.length)];
    chances = 20; hints = 2; timeLeft = 30;
    $('log-box').innerHTML = '';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $('game-screen').classList.add('active');
    timerId = setInterval(renderTimer, 100);
  }

  function submitGuess() {
    const val = $('user-input').value;
    if(val === target.word) alert("성공!");
    else { chances--; $('chance-count').textContent = chances; timeLeft = 30; }
  }

  function useHint() { if(hints > 0) { hints--; alert(target.specificHint); } }
  function resetGame() { location.reload(); }
</script>
</body>
</html>
