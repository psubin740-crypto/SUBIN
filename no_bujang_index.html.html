<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚨 노부장의 심기 경호</title>
    <style>
        :root {
            --primary: #1e293b;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f8fafc;
            --text: #0f172a;
            --hint: #d97706;
        }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
            overflow: hidden;
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-container {
            background: white;
            width: 100%;
            max-width: 430px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
        }
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 1.5rem;
            text-align: center;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }
        .screen.active {
            display: flex !important;
        }
        #start-screen, #fail-screen, #success-screen {
            justify-content: center;
            align-items: center;
        }
        h1 {
            color: var(--text);
            font-size: 1.6rem;
            margin: 0 0 0.5rem 0;
            font-weight: 800;
        }
        .desc {
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0 0 2rem 0;
        }
        .btn {
            background-color: var(--primary) !important;
            color: white !important;
            border: none !important;
            width: 100%;
            padding: 1.2rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s, transform 0.1s;
            display: block;
        }
        .btn:active {
            transform: scale(0.96);
            background-color: #0f172a !important;
        }
        
        #game-screen {
            display: none;
            flex-direction: column;
            padding: 1rem;
            height: 100%;
            justify-content: space-between;
        }
        .game-header {
            flex-shrink: 0;
            width: 100%;
        }
        .app-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 0.5rem;
            gap: 8px;
        }
        .badge {
            background: #f1f5f9;
            color: var(--text);
            padding: 0.5rem 0.8rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            border: 1px solid #e2e8f0;
            white-space: nowrap;
        }
        .badge-hint {
            background: #fef3c7;
            color: var(--hint);
            border: 1px solid #fde68a;
            cursor: pointer;
            font-family: inherit;
        }
        .badge-hint:active {
            background: #fde68a;
        }
        .badge-hint.disabled {
            background: #e2e8f0 !important;
            color: #94a3b8 !important;
            border: 1px solid #cbd5e1 !important;
            cursor: not-allowed;
        }
        .timer-text {
            color: var(--danger);
            font-weight: 800;
            font-size: 1.1rem;
            white-space: nowrap;
        }
        .progress-container {
            width: 100%;
            background-color: #e2e8f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.8rem;
        }
        .progress-bar {
            width: 100%;
            height: 100%;
            background-color: var(--danger);
            transition: width 0.1s linear;
        }
        .bujang-status-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .bujang-box {
            font-size: 3.2rem;
            margin-bottom: 0.2rem;
        }
        .bujang-status {
            font-size: 0.85rem;
            color: var(--danger);
            font-weight: bold;
            background: #fee2e2;
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
        }

        .log-box {
            flex: 1;
            width: 100%;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 1rem;
            overflow-y: auto;
            margin-bottom: 0.8rem;
            text-align: left;
            font-size: 0.95rem;
            -webkit-overflow-scrolling: touch;
        }
        .log-item {
            margin-bottom: 0.8rem;
            display: flex;
            flex-direction: column;
        }
        .sender-name {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 0.2rem;
            font-weight: bold;
        }
        .msg-bubble {
            padding: 0.6rem 0.8rem;
            border-radius: 10px;
            max-width: 85%;
            display: inline-block;
            word-break: break-all;
            line-height: 1.5;
        }
        .msg-user {
            align-items: flex-end;
        }
        .msg-user .msg-bubble {
            background: #2563eb;
            color: white;
            border-top-right-radius: 0;
        }
        .msg-bujang {
            align-items: flex-start;
        }
        .msg-bujang .msg-bubble {
            background: white;
            color: var(--text);
            border-top-left-radius: 0;
            border: 1px solid #e2e8f0;
        }
        .msg-hint-box {
            align-items: center;
            margin: 0.5rem 0;
        }
        .msg-hint-box .msg-bubble {
            background: #fffbeb;
            color: #b45309;
            border: 1px dashed #f59e0b;
            border-radius: 10px;
            text-align: center;
            max-width: 95%;
            font-weight: 500;
        }

        .input-area {
            flex-shrink: 0;
            width: 100%;
            display: flex;
            gap: 8px;
            align-items: center;
            background: white;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            height: 48px;
        }
        input[type="text"]:focus {
            border-color: var(--text);
        }
        .send-btn {
            background-color: var(--text);
            color: white;
            border: none;
            height: 48px;
            padding: 0 1.2rem;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }
        .send-btn:active {
            transform: scale(0.95);
            background-color: #1e293b;
        }
        .result-title {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0 0 0.5rem 0;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 시작 화면 -->
        <div id="start-screen" class="screen active">
            <div class="bujang-box">👹</div>
            <h1>노부장의 심기 경호</h1>
            <p class="desc">
                오늘따라 극도로 예민한 대공분실 급 노부장님.<br>
                속으로 바라는 <b>'그것'</b>을 눈치껏 알아내야 합니다.<br><br>
                <b>스무고개(20번의 기회)</b> | <b>질문당 30초 제한</b><br>
                💡 <b>힌트 찬스 총 2회 제공!</b><br><br>
                눈치 챙기세요. 까딱하면 바로 내일부터 실업자입니다.
            </p>
            <!-- 온클릭 바인딩을 완전히 확실하게 지정 -->
            <button type="button" class="btn" id="start-main-btn" onclick="startGame()">부장님실 입장 (눈치 탑재)</button>
        </div>

        <!-- 게임 화면 -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="app-bar">
                    <div class="badge">남은 고개: <span id="chance-count">20</span>/20</div>
                    <button type="button" id="hint-btn" class="badge badge-hint" onclick="useHint()">💡 힌트 보기 (<span id="hint-count">2</span>)</button>
                    <div id="timer-text" class="timer-text">30.0초</div>
                </div>
                <div class="progress-container">
                    <div id="timer-bar" class="progress-bar"></div>
                </div>
                <div class="bujang-status-box">
                    <div class="bujang-box" id="bujang-emoji">👹</div>
                    <div class="bujang-status" id="bujang-status">혈압 지수: 99% (폭발 직전)</div>
                </div>
            </div>
            
            <div class="log-box" id="log-box"></div>
            
            <div class="input-area">
                <input type="text" id="user-input" placeholder="질문을 입력하세요..." autocomplete="off">
                <button type="button" class="send-btn" onclick="submitGuess()">제출</button>
            </div>
        </div>

        <!-- 실패 화면 -->
        <div id="fail-screen" class="screen">
            <div style="font-size: 4rem; margin-bottom: 1rem;">✍️📄</div>
            <h1 class="result-title" style="color: var(--danger);">[권고사직] 시말서 엔딩</h1>
            <p class="desc" id="fail-reason" style="font-weight: 500;"></p>
            <button type="button" class="btn" style="background-color: var(--danger) !important;" onclick="resetGame()">짐 싸서 다시 도전하기</button>
        </div>

        <!-- 성공 화면 -->
        <div id="success-screen" class="screen">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🏃‍♂️✨</div>
            <h1 class="result-title" style="color: var(--success);">[超승진] 황금칼퇴 엔딩</h1>
            <p class="desc" style="color: #334155; font-weight: bold; font-size: 1.05rem; margin-bottom: 2rem;">
                "역시 자네야! 내 마음을 완벽하게 읽었구만!"<br>
                노부장님의 특별 총애를 얻어 당당하게 칼퇴근합니다!
            </p>
            <button type="button" class="btn" style="background-color: var(--success) !important;" onclick="resetGame()">다음 날 출근하기</button>
        </div>
    </div>

    <script>
        var wordPool = [
            { word: "아메리카노", type: "음료", isEatable: true, isPlace: false, isPerson: false, isObject: true, isWorkRelated: false, specificHint: "내 혈관에 수혈해야 하는 차갑고 까만 액체라네." },
            { word: "법인카드", type: "물건", isEatable: false, isPlace: false, isPerson: false, isObject: true, isWorkRelated: true, specificHint: "회식할 때나 밥 살 때 긁는 마법의 플라스틱 카드지!" },
            { word: "골프채", type: "물건", isEatable: false, isPlace: false, isPerson: false, isObject: true, isWorkRelated: false, specificHint: "내가 주말마다 필드 나가서 휘두르는 내 소중한 장비라네." },
            { word: "기획서", type: "문서", isEatable: false, isPlace: false, isPerson: false, isObject: true, isWorkRelated: true, specificHint: "아까 결재 도장 받으러 가져오라고 한 서류 뭉치일세. 회의할 때 꼭 필요하지!" },
            { word: "흡연실", type: "장소", isEatable: false, isPlace: true, isPerson: false, isObject: false, isWorkRelated: false, specificHint: "나 지금 라이터 들고 당장 거기로 튀어가고 싶구만." },
            { word: "주말농장", type: "장소", isEatable: false, isPlace: true, isPerson: false, isObject: false, isWorkRelated: false, specificHint: "주말에 거기 가서 상추나 배추 키우고 싶단 생각이 드는군." },
            { word: "김대리", type: "인물", isEatable: false, isPlace: false, isPerson: true, isObject: false, isWorkRelated: true, specificHint: "아침부터 대형 사고 치고 내 눈밖에 난 그 녀석 이름이네!" },
            { word: "탕비실", type: "장소", isEatable: false, isPlace: true, isPerson: false, isObject: false, isWorkRelated: true, specificHint: "믹스커피랑 정수기가 있는 사내 휴식 스팟이지." },
            { word: "회식", type: "상황", isEatable: false, isPlace: false, isPerson: false, isObject: false, isWorkRelated: true, specificHint: "오늘 저녁에 다 같이 삼겹살에 소주 한잔 걸치는 상황일세!" },
            { word: "승진", type: "개념", isEatable: false, isPlace: false, isPerson: false, isObject: false, isWorkRelated: true, specificHint: "자네 내년에 과장 달고 싶나? 내가 연말에 챙겨줄 직급 상승 기회지." }
        ];

        var currentQuestionCount = 20;
        var hintCount = 2;
        var timer = null;
        var timeLeft = 30.0;
        var totalDuration = 30.0;
        var targetData = null;

        var userInput, logBox;

        // 문서가 완전히 준비된 후 엘리먼트를 바인딩하여 무반응 버그 해결
        window.addEventListener('DOMContentLoaded', function() {
            userInput = document.getElementById('user-input');
            logBox = document.getElementById('log-box');
            
            if (userInput) {
                userInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        submitGuess();
                    }
                });
            }
            
            // 모바일 터치 미스 방지용 리스너 수동 추가 보완
            var startBtn = document.getElementById('start-main-btn');
            if (startBtn) {
                startBtn.addEventListener('touchstart', function() {
                    this.style.backgroundColor = '#0f172a';
                }, {passive: true});
            }
        });

        function startGame() {
            try {
                currentQuestionCount = 20;
                hintCount = 2;
                document.getElementById('chance-count').innerText = currentQuestionCount;
                document.getElementById('hint-count').innerText = hintCount;
                
                var hintBtn = document.getElementById('hint-btn');
                if (hintBtn) {
                    hintBtn.className = 'badge badge-hint';
                    hintBtn.disabled = false;
                }
                
                targetData = wordPool[Math.floor(Math.random() * wordPool.length)];
                
                if (logBox) {
                    logBox.innerHTML = "";
                    appendLog("부장", "이봐, 자네. 내가 지금 머릿속으로 원하고 있는 게 하나 있는데 뭔지 알겠나? 딱 20번 안에 알아내봐. 정 답답하면 상단의 힌트 버튼을 눌러보던가! 딱 2번만 줄 테니.");
                }
                
                document.getElementById('bujang-emoji').innerText = "👹";
                document.getElementById('bujang-status').innerText = "혈압 지수: 99% (폭발 직전)";
                document.getElementById('bujang-status').style.background = "#fee2e2";

                changeScreen(document.getElementById('game-screen'));
                
                if (userInput) {
                    userInput.value = "";
                    setTimeout(function() { userInput.focus(); }, 150);
                }
                runTimer();
            } catch (err) {
                console.error(err);
                // 혹시 모를 내부 예외 시 즉시 수동 화면 전환 트리거 백업
                changeScreen(document.getElementById('game-screen'));
            }
        }

        function runTimer() {
            clearInterval(timer);
            timeLeft = totalDuration;
            updateTimerUI();
            timer = setInterval(function() {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    var failMsg = '"내 질문에 대답하는 데 30초나 걸려?! 자네 정신머리가 나갔구만!"<br>결국 노부장님의 혈압이 폭발하며 권고사직 처리가 완료되었습니다.<br>정답은 [ <b>' + targetData.word + '</b> ] 이었습니다.';
                    gameOver(failMsg);
                }
                updateTimerUI();
            }, 100);
        }

        function updateTimerUI() {
            var tText = document.getElementById('timer-text');
            var tBar = document.getElementById('timer-bar');
            if (tText) tText.innerText = timeLeft.toFixed(1) + "초";
            if (tBar) {
                var percent = (timeLeft / totalDuration) * 100;
                tBar.style.width = percent + "%";
            }
        }

        function useHint() {
            if (hintCount <= 0) return;
            
            hintCount--;
            document.getElementById('hint-count').innerText = hintCount;
            
            if (hintCount === 0) {
                var hintBtn = document.getElementById('hint-btn');
                if (hintBtn) {
                    hintBtn.className = 'badge badge-hint disabled';
                    hintBtn.disabled = true;
                }
            }
            
            var hintText = "";
            if (hintCount === 1) {
                hintText = "💡 [첫 번째 힌트 슬쩍 보기]: 내가 생각한 단어는 <b>'" + targetData.type + "'</b> 카테고리이고, 총 <b>" + targetData.word.length + "글자</b>라네!";
            } else {
                hintText = "💡 [마지막 결정적 힌트]: 노부장님의 혼잣말... <i>"" + targetData.specificHint + ""</i>";
            }
            
            var item = document.createElement('div');
            item.className = 'log-item msg-hint-box';
            item.innerHTML = '<div class="msg-bubble">' + hintText + '</div>';
            if (logBox) {
                logBox.appendChild(item);
                logBox.scrollTop = logBox.scrollHeight;
            }
        }

        function submitGuess() {
            if (!userInput) return;
            var guess = userInput.value.trim();
            if (!guess) {
                alert("질문이나 단어를 입력창에 적고 제출해 주게!");
                return;
            }
            userInput.value = "";

            appendLog("유저", guess);

            currentQuestionCount--;
            document.getElementById('chance-count').innerText = currentQuestionCount;

            if (guess === targetData.word) {
                clearInterval(timer);
                setTimeout(function() {
                    changeScreen(document.getElementById('success-screen'));
                }, 300);
                return;
            }

            if (currentQuestionCount <= 0) {
                var failCountMsg = '"자네 눈치는 국 끓여 먹었나? 20번 기회를 줘도 몰라!"<br>노부장님이 결재판을 집어 던지며 시말서 작성을 명령했습니다.<br>정답은 [ <b>' + targetData.word + '</b> ] 이었습니다.';
                gameOver(failCountMsg);
                return;
            }

            var responseText = "";
            var isCorrectQuestion = false;

            if (guess.indexOf("회의") > -1 || guess.indexOf("업무") > -1 || guess.indexOf("회사") > -1 || guess.indexOf("사용") > -1 || guess.indexOf("일할때") > -1) {
                if (targetData.isWorkRelated) {
                    responseText = "오... 제법인데? 그래, 회사 업무나 직장 생활과 아주 깊은 연관이 있는 게 맞네! 눈치가 좀 있구만.";
                    isCorrectQuestion = true;
                } else {
                    responseText = "쯧, 일하는 거랑은 아무 상관 없네! 머리 좀 식히고 다시 생각해 보게.";
                }
            } 
            else if (guess.indexOf("먹는") > -1 || guess.indexOf("마시는") > -1 || guess.indexOf("음료") > -1 || guess.indexOf("식사") > -1) {
                if (targetData.isEatable) {
                    responseText = "음! 맞아! 지금 내 목구멍으로 당장 넘겨야 하는 무언가가 맞네!";
                    isCorrectQuestion = true;
                } else {
                    responseText = "어허, 먹고 마시는 거 아니라니까! 내가 지금 한가하게 배고파 보여?!";
                }
            } 
            else if (guess.indexOf("장소") > -1 || guess.indexOf("어디") > -1 || guess.indexOf("위치") > -1 || guess.indexOf("공간") > -1) {
                if (targetData.isPlace) {
                    responseText = "그래, 맞아! 특정 공간이나 회사 내외의 특정 '장소'가 맞네!";
                    isCorrectQuestion = true;
                } else {
                    responseText = "장소는 전혀 아닐세! 엉뚱한 데서 헤매지 말게!";
                }
            } 
            else if (guess.indexOf("사람") > -1 || guess.indexOf("인물") > -1 || guess.indexOf("직원") > -1 || guess.indexOf("누구") > -1) {
                if (targetData.isPerson) {
                    responseText = "오, 정확해! 우리 회사에 소속된 특정 '인물'에 대한 이야기라네.";
                    isCorrectQuestion = true;
                } else {
                    responseText = "사람 타령 하지 말게! 사람이 아니라 어떤 사물이나 개념에 가깝다네!";
                }
            } 
            else if (guess.indexOf("물건") > -1 || guess.indexOf("사물") > -1 || guess.indexOf("장비") > -1 || guess.indexOf("도구") > -1) {
                if (targetData.isObject) {
                    responseText = "그렇지! 눈에 보이고 손으로 만질 수 있는 '물건' 종류가 맞다네!";
                    isCorrectQuestion = true;
                } else {
                    responseText = "물건이 아니야! 형태가 없는 상황이나 장소 같은 거라니까!";
                }
            } 
            else if (guess.indexOf("글자") > -1 || guess.indexOf("길이") > -1 || guess.indexOf("글자수") > -1) {
                responseText = "내가 고른 단어는 딱 **" + targetData.word.length + "글자**라네.";
                isCorrectQuestion = true;
            } 
            else {
                if (guess.indexOf(targetData.word.substring(0, 2)) > -1 || guess.indexOf(targetData.type) > -1) {
                    responseText = "오! 거의 다 왔어! 바로 대답해주지. " + targetData.specificHint;
                    isCorrectQuestion = true;
                } else {
                    responseText = '"뭔 뚱딴지같은 소릴 하는 거야?! 나랑 지금 장난해? 내 머릿속 의도랑 완전히 엇나갔네!"';
                }
            }

            if (currentQuestionCount <= 5) {
                document.getElementById('bujang-emoji').innerText = "🌋";
                document.getElementById('bujang-status').innerText = "혈압 지수: 150% (시말서 인쇄 중)";
                document.getElementById('bujang-status').style.background = "#fca5a5";
            } else if (isCorrectQuestion) {
                document.getElementById('bujang-emoji').innerText = "😏";
                document.getElementById('bujang-status').innerText = "혈압 지수: 50% (정답에 가까워짐)";
                document.getElementById('bujang-status').style.background = "#bbf7d0";
            } else {
                document.getElementById('bujang-emoji').innerText = "👹";
                document.getElementById('bujang-status').innerText = "혈압 지수: " + (99 - (20 - currentQuestionCount)) + "% (대치 중)";
                document.getElementById('bujang-status').style.background = "#fee2e2";
            }

            setTimeout(function() {
                appendLog("부장", responseText);
                runTimer();
                if (userInput) userInput.focus();
            }, 300);
        }

        function appendLog(sender, text) {
            if (!logBox) return;
            var item = document.createElement('div');
            if (sender === "유저") {
                item.className = 'log-item msg-user';
                item.innerHTML = '<span class="sender-name">나 (사원)</span><div class="msg-bubble">' + text + '</div>';
            } else {
                item.className = 'log-item msg-bujang';
                item.innerHTML = '<span class="sender-name">노부장</span><div class="msg-bubble">' + text + '</div>';
            }
            logBox.appendChild(item);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function gameOver(reason) {
            clearInterval(timer);
            var fReason = document.getElementById('fail-reason');
            if (fReason) fReason.innerHTML = reason;
            changeScreen(document.getElementById('fail-screen'));
        }

        function resetGame() {
            changeScreen(document.getElementById('start-screen'));
        }

        function changeScreen(target) {
            if (!target) return;
            var screens = document.querySelectorAll('.screen');
            for (var i = 0; i < screens.length; i++) {
                screens[i].style.setProperty('display', 'none', 'important');
                screens[i].classList.remove('active');
            }
            target.style.setProperty('display', 'flex', 'important');
            target.classList.add('active');
        }
    </script>
</body>
</html>
